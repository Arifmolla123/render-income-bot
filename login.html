<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WealthVault  Register</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; }
        body { background:#0b0e1a; display:flex; justify-content:center; align-items:center; min-height:100vh; padding:16px; }
        .container { max-width:400px; width:100%; background:#13172a; border-radius:40px; padding:30px 24px; border:1px solid #2a2f4a; }
        h1 { text-align:center; color:#fff; font-size:32px; }
        h1 span { color:#f5b041; }
        p.sub { text-align:center; color:#8f9bb3; margin-bottom:30px; }
        .input-group { margin-bottom:16px; }
        .input-group label { color:#a8b2d1; font-size:13px; display:block; margin-bottom:4px; }
        .input-group input { width:100%; padding:14px 16px; border-radius:60px; border:1px solid #2a3158; background:#1a1f38; color:#fff; font-size:16px; outline:none; }
        .input-group input:focus { border-color:#f5b041; }
        .btn { width:100%; padding:16px; border:none; border-radius:60px; background:linear-gradient(135deg,#f5b041,#f7c948); color:#0b0e1a; font-weight:700; font-size:18px; cursor:pointer; margin-top:8px; }
        .btn:active { transform:scale(0.96); }
        .btn:disabled { opacity:0.6; cursor:not-allowed; }
        .btn-google { background:#ffffff; color:#1a1a2e; box-shadow:0 2px 8px rgba(0,0,0,0.2); display:flex; align-items:center; justify-content:center; gap:10px; }
        .btn-google svg { width:24px; height:24px; }
        .divider { display:flex; align-items:center; gap:12px; margin:20px 0; }
        .divider::before, .divider::after { content:''; flex:1; height:1px; background:#2a3158; }
        .divider span { color:#5a6488; font-size:13px; }
        .toggle { text-align:center; color:#8f9bb3; margin-top:16px; font-size:14px; }
        .toggle a { color:#f5b041; font-weight:600; cursor:pointer; }
        .error { color:#e74c3c; font-size:13px; text-align:center; min-height:22px; margin-top:8px; }
        .small-hint { color:#5a6488; font-size:12px; margin-top:2px; }
        .pass-rule { font-size:12px; color:#5a6488; margin-top:2px; }
        .referral-badge { background:#1a1f38; padding:10px; border-radius:20px; border:1px solid #f5b04133; color:#f5b041; font-size:14px; text-align:center; margin-bottom:16px; }
        .referral-badge strong { color:#fff; }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1> <span>Wealth</span>Vault</h1>
    <p class="sub">Invest & earn daily</p>

    <!-- Login Form (hidden by default if ref exists) -->
    <div id="loginForm" style="display:none;">
        <div class="input-group"><label> Phone</label><input type="text" id="loginPhone" placeholder="Enter phone number"></div>
        <div class="input-group"><label> Password</label><input type="password" id="loginPassword" placeholder="Your password"></div>
        <button class="btn" id="loginBtn" onclick="login()"> Login</button>
        <div class="divider"><span>OR</span></div>
        <button class="btn btn-google" onclick="googleLogin()">
            <svg viewBox="0 0 24 24" width="24" height="24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Sign in with Google
        </button>
        <div class="toggle">New user? <a onclick="showReg()">Create Account</a></div>
        <div class="error" id="loginError"></div>
    </div>

    <!-- Register Form (shown by default if ref exists) -->
    <div id="registerForm">
        <!--   -->
        <div id="referralBadge" class="referral-badge" style="display:none;">
             You were referred by <strong id="referrerDisplay">User</strong>! You both get bonus!
        </div>

        <div class="input-group"><label> Full Name</label><input type="text" id="regName" placeholder="Your full name"></div>
        <div class="input-group"><label> Phone</label><input type="text" id="regPhone" placeholder="Phone number"></div>
        <div class="input-group">
            <label> Password (min 6 chars)</label>
            <input type="password" id="regPassword" placeholder="Create a strong password" minlength="6">
            <div class="pass-rule">Use letters, numbers & special characters</div>
        </div>
        <div class="input-group">
            <label> Referrer Phone</label>
            <input type="text" id="regReferrer" placeholder="Referrer's phone" readonly style="background:#1a1f38;opacity:0.7;">
            <div class="small-hint">Auto-filled from referral link</div>
        </div>
        <button class="btn" id="regBtn" onclick="register()"> Register</button>
        <div class="divider"><span>OR</span></div>
        <button class="btn btn-google" onclick="googleLogin()">
            <svg viewBox="0 0 24 24" width="24" height="24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Sign in with Google
        </button>
        <div class="toggle">Already have account? <a onclick="showLogin()">Login</a></div>
        <div class="error" id="regError"></div>
    </div>
</div>

<script>
    // ================================================================
    const firebaseConfig = {
        apiKey: "AIzaSyAkq_YqX9N7j3b-_GK_7O7FcT-3RZfakH8",
        authDomain: "earn-app-3d66d.firebaseapp.com",
        databaseURL: "https://earn-app-3d66d-default-rtdb.firebaseio.com",
        projectId: "earn-app-3d66d",
        storageBucket: "earn-app-3d66d.firebasestorage.app",
        messagingSenderId: "411398449895",
        appId: "1:411398449895:web:aff196fcc3c0b1669e9042",
        measurementId: "G-RS4F95THHY"
    };
    // ================================================================

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // ---------- URL     ----------
    const urlParams = new URLSearchParams(window.location.search);
    const referrerPhone = urlParams.get('ref') || null;

    //     ,   
    if (referrerPhone) {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
        document.getElementById('regReferrer').value = referrerPhone;
        //     ()
        db.ref('users').orderByChild('phone').equalTo(referrerPhone).once('value').then(snap => {
            if (snap.exists()) {
                const key = Object.keys(snap.val())[0];
                const data = snap.val()[key];
                document.getElementById('referrerDisplay').innerText = data.name || 'User';
                document.getElementById('referralBadge').style.display = 'block';
            }
        });
    } else {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
    }

    // ---------- Google Login (  ) ----------
    async function googleLogin() {
        const provider = new firebase.auth.GoogleAuthProvider();
        try {
            const result = await auth.signInWithPopup(provider);
            const user = result.user;
            const snapshot = await db.ref('users/' + user.uid).once('value');

            if (!snapshot.exists()) {
                const email = user.email || '';
                const phone = email.split('@')[0] || 'N/A';
                const name = user.displayName || 'Google User';
                const ref = document.getElementById('regReferrer').value.trim() || referrerPhone || null;

                //   
                await db.ref('users/' + user.uid).set({
                    name: name,
                    phone: phone,
                    balance: 35,
                    dailyReturn: 0,
                    totalInvested: 0,
                    totalEarnings: 0,
                    history: [' Welcome bonus +35'],
                    referredBy: ref || null,
                    createdAt: Date.now()
                });

                //   
                if (ref && ref !== phone) {
                    const snap2 = await db.ref('users').orderByChild('phone').equalTo(ref).once('value');
                    if (snap2.exists()) {
                        const refKey = Object.keys(snap2.val())[0];
                        const refData = snap2.val()[refKey];
                        const newBalance = (refData.balance || 0) + 200;
                        const newHistory = refData.history || [];
                        newHistory.unshift(` Referral bonus +200 (from ${phone})`);
                        await db.ref('users/' + refKey).update({
                            balance: newBalance,
                            history: newHistory
                        });
                    }
                }
            }
            window.location.href = 'dashboard.html';
        } catch (error) {
            document.getElementById('regError').innerText = error.message;
        }
    }

    // ---------- Email/Password Register ----------
    async function register() {
        const name = document.getElementById('regName').value.trim();
        const phone = document.getElementById('regPhone').value.trim();
        const password = document.getElementById('regPassword').value.trim();
        const ref = document.getElementById('regReferrer').value.trim();

        if (!name || !phone || password.length < 6) {
            document.getElementById('regError').innerText = 'Fill all fields & use password (min 6 chars).';
            return;
        }

        const cleanPhone = phone.replace(/[^0-9]/g, '');
        const email = `${cleanPhone}@wealthvault.auth`;

        const btn = document.getElementById('regBtn');
        btn.disabled = true;
        btn.innerText = 'Creating...';

        try {
            const userCred = await auth.createUserWithEmailAndPassword(email, password);
            const uid = userCred.user.uid;

            await db.ref('users/' + uid).set({
                name, phone,
                balance: 35,
                dailyReturn: 0,
                totalInvested: 0,
                totalEarnings: 0,
                history: [' Welcome bonus +35'],
                referredBy: ref || null,
                createdAt: Date.now()
            });

            if (ref && ref !== phone) {
                const snap = await db.ref('users').orderByChild('phone').equalTo(ref).once('value');
                if (snap.exists()) {
                    const refKey = Object.keys(snap.val())[0];
                    const refData = snap.val()[refKey];
                    const newBalance = (refData.balance || 0) + 200;
                    const newHistory = refData.history || [];
                    newHistory.unshift(` Referral bonus +200 (from ${phone})`);
                    await db.ref('users/' + refKey).update({
                        balance: newBalance,
                        history: newHistory
                    });
                }
            }

            window.location.href = 'dashboard.html';

        } catch (error) {
            document.getElementById('regError').innerText = error.message;
            btn.disabled = false;
            btn.innerText = ' Register';
        }
    }

    // ---------- Email/Password Login ----------
    async function login() {
        const phone = document.getElementById('loginPhone').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        if (!phone || password.length < 6) {
            document.getElementById('loginError').innerText = 'Enter valid phone & password.';
            return;
        }
        const cleanPhone = phone.replace(/[^0-9]/g, '');
        const email = `${cleanPhone}@wealthvault.auth`;

        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.innerText = 'Logging in...';

        try {
            await auth.signInWithEmailAndPassword(email, password);
            window.location.href = 'dashboard.html';
        } catch (error) {
            document.getElementById('loginError').innerText = error.message;
            btn.disabled = false;
            btn.innerText = ' Login';
        }
    }

    // ---------- UI  ----------
    function showReg() {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
        document.getElementById('loginError').innerText = '';
        document.getElementById('regError').innerText = '';
        if (referrerPhone) document.getElementById('regReferrer').value = referrerPhone;
    }
    function showLogin() {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('loginError').innerText = '';
        document.getElementById('regError').innerText = '';
    }

    auth.onAuthStateChanged((user) => {
        if (user) window.location.href = 'dashboard.html';
    });
</script>
</body>
</html>
