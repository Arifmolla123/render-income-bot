<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WealthVault  Login</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif; }
        body { background:#0b0e1a; display:flex; justify-content:center; align-items:center; min-height:100vh; padding:16px; }
        .container { max-width:400px; width:100%; background:#13172a; border-radius:40px; padding:30px 24px; border:1px solid #2a2f4a; box-shadow:0 25px 50px -12px rgba(0,0,0,0.8); }
        .logo { text-align:center; margin-bottom:24px; }
        .logo svg { width:56px; height:56px; }
        .logo h1 { color:#fff; font-size:28px; font-weight:700; margin-top:6px; letter-spacing:-0.5px; }
        .logo h1 span { color:#f5b041; }
        .sub { color:#8f9bb3; text-align:center; margin-bottom:28px; font-size:15px; }
        .input-group { margin-bottom:16px; }
        .input-group label { color:#a8b2d1; font-size:13px; font-weight:500; display:block; margin-bottom:4px; }
        .input-group input { width:100%; padding:14px 16px; border-radius:60px; border:1px solid #2a3158; background:#1a1f38; color:#fff; font-size:16px; outline:none; transition:0.2s; }
        .input-group input:focus { border-color:#f5b041; box-shadow:0 0 0 3px rgba(245,176,65,0.1); }
        .btn { width:100%; padding:16px; border:none; border-radius:60px; background:linear-gradient(135deg,#f5b041,#f7c948); color:#0b0e1a; font-weight:700; font-size:18px; cursor:pointer; transition:0.2s; margin-top:6px; }
        .btn:active { transform:scale(0.96); }
        .btn:disabled { opacity:0.6; cursor:not-allowed; }
        .toggle { text-align:center; color:#8f9bb3; margin-top:16px; font-size:14px; }
        .toggle a { color:#f5b041; font-weight:600; cursor:pointer; text-decoration:none; }
        .error { color:#e74c3c; font-size:13px; text-align:center; min-height:22px; margin-top:8px; }
        .referral-badge { background:#1a1f38; padding:12px; border-radius:20px; border:1px solid #f5b04133; color:#f5b041; font-size:14px; text-align:center; margin-bottom:16px; }
        .referral-badge strong { color:#fff; }
        /* Device block message */
        .device-block { background:#2a1a1a; border:1px solid #e74c3c33; border-radius:20px; padding:12px; color:#e74c3c; text-align:center; font-size:14px; margin-bottom:16px; display:none; }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="#f5b041" opacity="0.2"/>
            <path d="M12 6v6l4 2" stroke="#f5b041" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="12" cy="12" r="8" stroke="#f5b041" stroke-width="2"/>
        </svg>
        <h1> <span>Wealth</span>Vault</h1>
    </div>
    <p class="sub">Invest & earn daily</p>

    <div id="deviceBlockMsg" class="device-block"> This device already has an account. Only one account per device allowed.</div>

    <div id="referralBadge" class="referral-badge" style="display:none;">
         You were referred by <strong id="referrerName">User</strong>!<br>
        <span style="font-size:13px; color:#a8b2d1;">You get 35 Welcome Bonus & they get 200!</span>
    </div>

    <div id="loginForm">
        <div class="input-group"><label> Phone</label><input type="text" id="loginPhone" placeholder="Enter phone number"></div>
        <div class="input-group"><label> Password</label><input type="password" id="loginPassword" placeholder="Your password"></div>
        <button class="btn" id="loginBtn" onclick="login()"> Login</button>
        <div class="toggle">New user? <a onclick="showReg()">Create Account</a></div>
        <div class="error" id="loginError"></div>
    </div>

    <div id="registerForm" style="display:none;">
        <div class="input-group"><label> Full Name</label><input type="text" id="regName" placeholder="Your full name"></div>
        <div class="input-group"><label> Phone</label><input type="text" id="regPhone" placeholder="Phone number"></div>
        <div class="input-group"><label> Password (min 6 chars)</label><input type="password" id="regPassword" placeholder="Create a strong password" minlength="6"></div>
        <div class="input-group"><label> Referrer (auto-filled)</label><input type="text" id="regReferrer" placeholder="Referrer's UID" readonly style="background:#1a1f38;opacity:0.7;"></div>
        <button class="btn" id="regBtn" onclick="register()"> Register</button>
        <div class="toggle">Already have account? <a onclick="showLogin()">Login</a></div>
        <div class="error" id="regError"></div>
    </div>
</div>

<script>
    // ================================================================
    const firebaseConfig = {
        apiKey: "AIzaSyAkq_YqX9N7j3b-_GK_7O7FcT-3RZfakH8",
        authDomain: "earn-app-3d66d.firebaseapp.com",
        databaseURL: "https://earn-app-3d66d-default-rtdb.firebaseio.com",
        projectId: "earn-app-3d66d",
        storageBucket: "earn-app-3d66d.firebasestorage.app",
        messagingSenderId: "411398449895",
        appId: "1:411398449895:web:aff196fcc3c0b1669e9042",
        measurementId: "G-RS4F95THHY"
    };
    // ================================================================

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // ---------- Device ID (unique per browser) ----------
    function getDeviceId() {
        let deviceId = localStorage.getItem('wealthvault_device_id');
        if (!deviceId) {
            deviceId = 'device_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            localStorage.setItem('wealthvault_device_id', deviceId);
        }
        return deviceId;
    }
    const DEVICE_ID = getDeviceId();

    // ---------- URL   (uid)  ----------
    const urlParams = new URLSearchParams(window.location.search);
    const referrerUid = urlParams.get('ref') || null;

    //  uid   
    if (referrerUid) {
        db.ref('users/' + referrerUid).once('value').then(snap => {
            if (snap.exists()) {
                const data = snap.val();
                document.getElementById('referrerName').innerText = data.name || 'User';
                document.getElementById('referralBadge').style.display = 'block';
            }
        });
        document.getElementById('regReferrer').value = referrerUid;
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
    }

    // ---------- Check if this device already registered ----------
    async function checkDeviceBlock() {
        const snapshot = await db.ref('devices').orderByChild('deviceId').equalTo(DEVICE_ID).once('value');
        if (snapshot.exists()) {
            //       
            document.getElementById('deviceBlockMsg').style.display = 'block';
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('referralBadge').style.display = 'none';
            return true;
        }
        return false;
    }

    // ---------- UI  ----------
    function showReg() {
        checkDeviceBlock().then(blocked => {
            if (blocked) return;
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('loginError').innerText = '';
            document.getElementById('regError').innerText = '';
            if (referrerUid) document.getElementById('regReferrer').value = referrerUid;
        });
    }
    function showLogin() {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('loginError').innerText = '';
        document.getElementById('regError').innerText = '';
        document.getElementById('deviceBlockMsg').style.display = 'none';
    }

    // ---------- Register ----------
    async function register() {
        //   
        const blocked = await checkDeviceBlock();
        if (blocked) return;

        const name = document.getElementById('regName').value.trim();
        const phone = document.getElementById('regPhone').value.trim();
        const password = document.getElementById('regPassword').value.trim();
        const referrerUid = document.getElementById('regReferrer').value.trim() || null;

        if (!name || !phone || password.length < 6) {
            document.getElementById('regError').innerText = 'Fill all fields & use password (min 6 chars).';
            return;
        }

        const cleanPhone = phone.replace(/[^0-9]/g, '');
        const email = `${cleanPhone}@wealthvault.auth`;

        const btn = document.getElementById('regBtn');
        btn.disabled = true;
        btn.innerText = 'Creating...';

        try {
            const userCred = await auth.createUserWithEmailAndPassword(email, password);
            const uid = userCred.user.uid;

            //  
            const userData = {
                name, phone,
                balance: 35,
                dailyReturn: 0,
                totalInvested: 0,
                totalEarnings: 0,
                history: [' Welcome bonus +35'],
                referredBy: referrerUid || null,
                upiId: '',
                deviceId: DEVICE_ID,
                createdAt: Date.now()
            };
            await db.ref('users/' + uid).set(userData);

            //  
            await db.ref('devices/' + uid).set({ deviceId: DEVICE_ID, uid: uid, createdAt: Date.now() });

            //  
            if (referrerUid && referrerUid !== uid) {
                const refSnap = await db.ref('users/' + referrerUid).once('value');
                if (refSnap.exists()) {
                    const refData = refSnap.val();
                    const newBalance = (refData.balance || 0) + 200;
                    const newHistory = refData.history || [];
                    newHistory.unshift(` Referral bonus +200 (from ${phone})`);
                    await db.ref('users/' + referrerUid).update({ balance: newBalance, history: newHistory });
                }
            }

            alert(' Welcome! You received 35 bonus. Your referrer got 200!');
            window.location.href = 'dashboard.html';

        } catch (error) {
            document.getElementById('regError').innerText = error.message;
            btn.disabled = false;
            btn.innerText = ' Register';
        }
    }

    // ---------- Login ----------
    async function login() {
        const phone = document.getElementById('loginPhone').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        if (!phone || password.length < 6) {
            document.getElementById('loginError').innerText = 'Enter valid phone & password.';
            return;
        }
        const cleanPhone = phone.replace(/[^0-9]/g, '');
        const email = `${cleanPhone}@wealthvault.auth`;

        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.innerText = 'Logging in...';

        try {
            await auth.signInWithEmailAndPassword(email, password);
            window.location.href = 'dashboard.html';
        } catch (error) {
            document.getElementById('loginError').innerText = error.message;
            btn.disabled = false;
            btn.innerText = ' Login';
        }
    }

    auth.onAuthStateChanged((user) => {
        if (user) window.location.href = 'dashboard.html';
    });

    //     
    window.onload = function() {
        checkDeviceBlock();
    };
</script>
</body>
</html>
