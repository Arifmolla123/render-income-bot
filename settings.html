<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Settings – WealthVault</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',-apple-system,sans-serif; }
        body { background:#0b0e1a; display:flex; justify-content:center; align-items:center; min-height:100vh; padding:16px; }
        .container { max-width:400px; width:100%; background:#13172a; border-radius:40px; padding:30px 24px; border:1px solid #2a2f4a; }
        .back-link { color:#a8b2d1; text-decoration:none; display:inline-block; margin-bottom:20px; font-size:14px; }
        .back-link:active { color:#f5b041; }
        h1 { color:#fff; font-size:28px; margin-bottom:20px; }
        h1 span { color:#f5b041; }
        .field { margin-bottom:20px; }
        .field label { color:#a8b2d1; font-size:13px; display:block; margin-bottom:4px; }
        .field .value { color:#fff; font-size:18px; font-weight:500; background:#1a1f38; padding:12px 16px; border-radius:60px; border:1px solid #2a3158; }
        .field input { width:100%; padding:12px 16px; border-radius:60px; border:1px solid #2a3158; background:#1a1f38; color:#fff; font-size:16px; outline:none; }
        .field input:focus { border-color:#f5b041; }
        .btn-save { width:100%; padding:16px; border:none; border-radius:60px; background:linear-gradient(135deg,#f5b041,#f7c948); color:#0b0e1a; font-weight:700; font-size:18px; cursor:pointer; }
        .btn-save:active { transform:scale(0.96); }
        .message { color:#28a745; font-size:14px; text-align:center; margin-top:12px; }
        .error-msg { color:#e74c3c; font-size:14px; text-align:center; margin-top:8px; }
    </style>
</head>
<body>
<div class="container">
    <a href="dashboard.html" class="back-link">⬅ Back to Dashboard</a>
    <h1>⚙️ <span>Settings</span></h1>
    <div class="field">
        <label>👤 Full Name</label>
        <input type="text" id="editName" placeholder="Your name">
    </div>
    <div class="field">
        <label>📱 Phone Number</label>
        <div class="value" id="displayPhone">+91 98765 43210</div>
        <div style="font-size:12px; color:#5a6488; margin-top:4px;">Phone cannot be changed</div>
    </div>
    <div class="field">
        <label>🔒 PIN (4 digits)</label>
        <input type="password" id="editPin" placeholder="New 4-digit PIN" maxlength="4" inputmode="numeric">
    </div>
    <button class="btn-save" onclick="saveSettings()">💾 Save Changes</button>
    <div id="msg" class="message"></div>
    <div id="err" class="error-msg"></div>
</div>
<script>
    function loadSettings() {
        const session = localStorage.getItem('wealthvault_session');
        if (!session) { window.location.href = 'login.html'; return; }
        const users = JSON.parse(localStorage.getItem('wealthvault_users')) || {};
        if (!users[session]) { localStorage.removeItem('wealthvault_session'); window.location.href = 'login.html'; return; }
        document.getElementById('editName').value = users[session].name || '';
        document.getElementById('displayPhone').innerText = users[session].phone || '';
    }
    function saveSettings() {
        const session = localStorage.getItem('wealthvault_session');
        if (!session) { window.location.href = 'login.html'; return; }
        const users = JSON.parse(localStorage.getItem('wealthvault_users')) || {};
        if (!users[session]) { localStorage.removeItem('wealthvault_session'); window.location.href = 'login.html'; return; }
        const newName = document.getElementById('editName').value.trim();
        const newPin = document.getElementById('editPin').value.trim();
        if (!newName) { document.getElementById('err').innerText = 'Name cannot be empty.'; document.getElementById('msg').innerText = ''; return; }
        if (newPin && newPin.length !== 4) { document.getElementById('err').innerText = 'PIN must be 4 digits.'; document.getElementById('msg').innerText = ''; return; }
        users[session].name = newName;
        if (newPin) users[session].pin = newPin;
        localStorage.setItem('wealthvault_users', JSON.stringify(users));
        document.getElementById('err').innerText = '';
        document.getElementById('msg').innerText = '✅ Settings updated!';
        setTimeout(() => document.getElementById('msg').innerText = '', 3000);
    }
    window.onload = loadSettings;
</script>
</body>
</html>
