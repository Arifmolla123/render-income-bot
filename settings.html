<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Settings – WealthVault</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; }
        body { background:#0b0e1a; display:flex; justify-content:center; align-items:center; min-height:100vh; padding:16px; }
        .container { max-width:400px; width:100%; background:#13172a; border-radius:40px; padding:30px 24px; border:1px solid #2a2f4a; }
        .back-link { color:#a8b2d1; text-decoration:none; display:inline-block; margin-bottom:20px; font-size:14px; }
        .back-link:active { color:#f5b041; }
        h1 { color:#fff; font-size:28px; margin-bottom:20px; }
        h1 span { color:#f5b041; }
        .field { margin-bottom:20px; }
        .field label { color:#a8b2d1; font-size:13px; display:block; margin-bottom:4px; }
        .field .value { color:#fff; font-size:18px; font-weight:500; background:#1a1f38; padding:12px 16px; border-radius:60px; border:1px solid #2a3158; }
        .field input { width:100%; padding:12px 16px; border-radius:60px; border:1px solid #2a3158; background:#1a1f38; color:#fff; font-size:16px; outline:none; }
        .field input:focus { border-color:#f5b041; }
        .btn-save { width:100%; padding:16px; border:none; border-radius:60px; background:linear-gradient(135deg,#f5b041,#f7c948); color:#0b0e1a; font-weight:700; font-size:18px; cursor:pointer; }
        .btn-save:active { transform:scale(0.96); }
        .btn-save:disabled { opacity:0.6; }
        .message { color:#28a745; font-size:14px; text-align:center; margin-top:12px; }
        .error-msg { color:#e74c3c; font-size:14px; text-align:center; margin-top:8px; }
    </style>
</head>
<body>
<div class="container">
    <a href="dashboard.html" class="back-link">⬅ Back to Dashboard</a>
    <h1>⚙️ <span>Settings</span></h1>
    <div class="field">
        <label>👤 Full Name</label>
        <input type="text" id="editName" placeholder="Your name">
    </div>
    <div class="field">
        <label>📱 Phone Number</label>
        <div class="value" id="displayPhone">Loading...</div>
        <div style="font-size:12px; color:#5a6488; margin-top:4px;">Phone cannot be changed</div>
    </div>
    <div class="field">
        <label>🔒 New Password (min 6 chars)</label>
        <input type="password" id="editPassword" placeholder="New password" minlength="6">
        <div style="font-size:12px; color:#5a6488; margin-top:4px;">Leave blank to keep current password</div>
    </div>
    <button class="btn-save" id="saveBtn" onclick="saveSettings()">💾 Save Changes</button>
    <div id="msg" class="message"></div>
    <div id="err" class="error-msg"></div>
</div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAkq_YqX9N7j3b-_GK_7O7FcT-3RZfakH8",
        authDomain: "earn-app-3d66d.firebaseapp.com",
        databaseURL: "https://earn-app-3d66d-default-rtdb.firebaseio.com",
        projectId: "earn-app-3d66d",
        storageBucket: "earn-app-3d66d.firebasestorage.app",
        messagingSenderId: "411398449895",
        appId: "1:411398449895:web:aff196fcc3c0b1669e9042",
        measurementId: "G-RS4F95THHY"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    let currentUid = null;

    auth.onAuthStateChanged((user) => {
        if (user) {
            currentUid = user.uid;
            db.ref('users/' + user.uid).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    document.getElementById('editName').value = data.name || '';
                    document.getElementById('displayPhone').innerText = data.phone || 'N/A';
                }
            });
        } else {
            window.location.href = 'login.html';
        }
    });

    async function saveSettings() {
        const newName = document.getElementById('editName').value.trim();
        const newPassword = document.getElementById('editPassword').value.trim();

        if (!newName) {
            document.getElementById('err').innerText = 'Name cannot be empty.';
            document.getElementById('msg').innerText = '';
            return;
        }

        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        btn.innerText = 'Saving...';

        try {
            await db.ref('users/' + currentUid).update({ name: newName });

            if (newPassword.length >= 6) {
                await auth.currentUser.updatePassword(newPassword);
            }

            document.getElementById('err').innerText = '';
            document.getElementById('msg').innerText = '✅ Settings updated successfully!';
            setTimeout(() => document.getElementById('msg').innerText = '', 3000);

        } catch (error) {
            document.getElementById('err').innerText = error.message;
        } finally {
            btn.disabled = false;
            btn.innerText = '💾 Save Changes';
        }
    }
</script>
</body>
</html>
