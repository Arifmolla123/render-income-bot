<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Set UPI – WealthVault</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif; }
        body { background:#0b0e1a; display:flex; justify-content:center; align-items:center; min-height:100vh; padding:16px; }
        .container { max-width:400px; width:100%; background:#13172a; border-radius:40px; padding:30px 24px; border:1px solid #2a2f4a; box-shadow:0 25px 50px -12px rgba(0,0,0,0.8); }
        .back-link { color:#a8b2d1; text-decoration:none; display:inline-flex; align-items:center; gap:6px; margin-bottom:20px; font-size:14px; transition:0.2s; }
        .back-link:hover { color:#f5b041; }
        .back-link svg { width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:2; }
        h1 { color:#fff; font-size:28px; margin-bottom:20px; display:flex; align-items:center; gap:10px; }
        h1 span { color:#f5b041; }
        .current-upi { color:#a8b2d1; font-size:14px; margin-bottom:16px; text-align:center; background:#1a1f38; padding:10px; border-radius:20px; border:1px solid #2a3158; }
        .current-upi strong { color:#f5b041; }
        .field { margin-bottom:20px; }
        .field label { color:#a8b2d1; font-size:13px; font-weight:500; display:block; margin-bottom:4px; }
        .field input { width:100%; padding:12px 16px; border-radius:60px; border:1px solid #2a3158; background:#1a1f38; color:#fff; font-size:16px; outline:none; transition:0.2s; }
        .field input:focus { border-color:#f5b041; box-shadow:0 0 0 3px rgba(245,176,65,0.1); }
        .btn-save { width:100%; padding:16px; border:none; border-radius:60px; background:linear-gradient(135deg,#f5b041,#f7c948); color:#0b0e1a; font-weight:700; font-size:18px; cursor:pointer; transition:0.2s; }
        .btn-save:active { transform:scale(0.96); }
        .btn-save:disabled { opacity:0.6; cursor:not-allowed; }
        .message { color:#28a745; font-size:14px; text-align:center; margin-top:12px; }
        .error-msg { color:#e74c3c; font-size:14px; text-align:center; margin-top:8px; }
    </style>
</head>
<body>
<div class="container">
    <a href="dashboard.html" class="back-link">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        Back to Dashboard
    </a>
    <h1>💳 <span>Set UPI</span></h1>
    <div class="current-upi" id="currentUpiDisplay">Current UPI: <strong>Not set</strong></div>
    <div class="field">
        <label>Your UPI ID</label>
        <input type="text" id="upiInput" placeholder="e.g. yourname@paytm">
        <div style="font-size:12px; color:#5a6488; margin-top:4px;">All payments will go to this UPI</div>
    </div>
    <button class="btn-save" id="saveBtn" onclick="saveUpi()">💾 Save UPI</button>
    <div id="msg" class="message"></div>
    <div id="err" class="error-msg"></div>
</div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAkq_YqX9N7j3b-_GK_7O7FcT-3RZfakH8",
        authDomain: "earn-app-3d66d.firebaseapp.com",
        databaseURL: "https://earn-app-3d66d-default-rtdb.firebaseio.com",
        projectId: "earn-app-3d66d",
        storageBucket: "earn-app-3d66d.firebasestorage.app",
        messagingSenderId: "411398449895",
        appId: "1:411398449895:web:aff196fcc3c0b1669e9042",
        measurementId: "G-RS4F95THHY"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    let currentUid = null;

    auth.onAuthStateChanged((user) => {
        if (user) {
            currentUid = user.uid;
            db.ref('users/' + user.uid).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    const upi = data.upiId || 'Not set';
                    document.getElementById('currentUpiDisplay').innerHTML = `Current UPI: <strong>${upi}</strong>`;
                    document.getElementById('upiInput').value = data.upiId || '';
                }
            });
        } else {
            window.location.href = 'login.html';
        }
    });

    async function saveUpi() {
        const upi = document.getElementById('upiInput').value.trim();
        if (!upi) {
            document.getElementById('err').innerText = 'Please enter a valid UPI ID.';
            document.getElementById('msg').innerText = '';
            return;
        }
        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        btn.innerText = 'Saving...';

        try {
            await db.ref('users/' + currentUid).update({ upiId: upi });
            document.getElementById('err').innerText = '';
            document.getElementById('msg').innerText = '✅ UPI saved successfully!';
            document.getElementById('currentUpiDisplay').innerHTML = `Current UPI: <strong>${upi}</strong>`;
            setTimeout(() => document.getElementById('msg').innerText = '', 3000);
        } catch (error) {
            document.getElementById('err').innerText = error.message;
        } finally {
            btn.disabled = false;
            btn.innerText = '💾 Save UPI';
        }
    }
</script>
</body>
</html>
